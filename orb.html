<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hero Orb Background</title>
  <style>
    :root {
      --primary: #8ab4f8;
      --primary-light: #b8d0fb;
      --primary-dark: #5f8dd8;

      --secondary: #7bcf9f;
      --secondary-light: #a1dfb9;
      --secondary-dark: #4ea877;

      --bg: #0d1117;
      --paper: #141b25;

      --text: #e6edf6;
      --text-secondary: #aab8cb;
      --divider: rgba(170, 184, 203, 0.22);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Inter, system-ui, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 50% 45%, rgba(138, 180, 248, 0.05), transparent 28%),
        radial-gradient(circle at 70% 30%, rgba(123, 207, 159, 0.04), transparent 20%),
        transparent;
    }

    .hero-bg {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* transparent checker pattern */
    .checker {
      position: absolute;
      inset: 0;
      opacity: 0.14;
      background-image:
        linear-gradient(45deg, rgba(170, 184, 203, 0.05) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(170, 184, 203, 0.05) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(170, 184, 203, 0.05) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(170, 184, 203, 0.05) 75%);
      background-size: 64px 64px;
      background-position:
        0 0,
        0 32px,
        32px -32px,
        -32px 0;
      mask-image: radial-gradient(circle at center, black 40%, transparent 90%);
      -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 90%);
      pointer-events: none;
    }

    .orb-scene {
      position: relative;
      width: 760px;
      height: 760px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .orb-ambient {
      position: absolute;
      width: 620px;
      height: 620px;
      border-radius: 50%;
      z-index: 0;
      animation: ambientShift 8s ease-in-out infinite;
      filter: blur(8px);
    }

    @keyframes ambientShift {
      0%, 100% {
        box-shadow:
          0 0 90px 20px rgba(138, 180, 248, 0.14),
          0 0 180px 40px rgba(95, 141, 216, 0.06);
      }
      50% {
        box-shadow:
          0 0 90px 20px rgba(123, 207, 159, 0.12),
          0 0 180px 40px rgba(138, 180, 248, 0.07);
      }
    }

    .orb-ring,
    .orb-ring-2 {
      position: absolute;
      border-radius: 50%;
      z-index: 2;
    }

    .orb-ring {
      width: 500px;
      height: 500px;
      animation: spin 9s linear infinite;
    }

    .orb-ring::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      padding: 2px;
      background: conic-gradient(
        from 0deg,
        transparent 0%,
        rgba(184, 208, 251, 0.95) 12%,
        rgba(138, 180, 248, 0.95) 28%,
        rgba(123, 207, 159, 0.85) 43%,
        transparent 58%,
        rgba(138, 180, 248, 0.75) 76%,
        rgba(184, 208, 251, 0.95) 90%,
        transparent 100%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      filter: drop-shadow(0 0 10px rgba(138, 180, 248, 0.35))
              drop-shadow(0 0 20px rgba(123, 207, 159, 0.18));
    }

    .orb-ring-2 {
      width: 550px;
      height: 550px;
      animation: spinReverse 13s linear infinite;
    }

    .orb-ring-2::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      padding: 1px;
      background: conic-gradient(
        from 180deg,
        transparent 0%,
        rgba(123, 207, 159, 0.75) 18%,
        transparent 35%,
        rgba(184, 208, 251, 0.55) 58%,
        rgba(138, 180, 248, 0.7) 74%,
        transparent 100%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      filter: drop-shadow(0 0 8px rgba(138, 180, 248, 0.25));
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes spinReverse {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }

    .orb-body {
      position: absolute;
      width: 430px;
      height: 430px;
      border-radius: 50%;
      z-index: 1;
      background:
        radial-gradient(
          ellipse at 35% 35%,
          rgba(184, 208, 251, 0.12) 0%,
          rgba(138, 180, 248, 0.10) 24%,
          rgba(95, 141, 216, 0.08) 48%,
          rgba(123, 207, 159, 0.05) 72%,
          transparent 100%
        );
      border: 1px solid rgba(184, 208, 251, 0.10);
      animation: breathe 5s ease-in-out infinite;
      backdrop-filter: blur(1px);
    }

    @keyframes breathe {
      0%, 100% {
        transform: scale(1);
        opacity: 0.92;
      }
      50% {
        transform: scale(1.04);
        opacity: 1;
      }
    }

    .orb-glow {
      position: absolute;
      width: 350px;
      height: 350px;
      border-radius: 50%;
      z-index: 1;
      animation: glowShift 6s ease-in-out infinite;
      filter: blur(2px);
    }

    @keyframes glowShift {
      0% {
        background: radial-gradient(circle at 40% 40%,
          rgba(184, 208, 251, 0.28) 0%,
          rgba(138, 180, 248, 0.14) 36%,
          transparent 70%);
      }
      25% {
        background: radial-gradient(circle at 62% 32%,
          rgba(123, 207, 159, 0.24) 0%,
          rgba(138, 180, 248, 0.13) 40%,
          transparent 70%);
      }
      50% {
        background: radial-gradient(circle at 60% 64%,
          rgba(138, 180, 248, 0.24) 0%,
          rgba(95, 141, 216, 0.12) 42%,
          transparent 70%);
      }
      75% {
        background: radial-gradient(circle at 30% 60%,
          rgba(184, 208, 251, 0.22) 0%,
          rgba(123, 207, 159, 0.10) 40%,
          transparent 70%);
      }
      100% {
        background: radial-gradient(circle at 40% 40%,
          rgba(184, 208, 251, 0.28) 0%,
          rgba(138, 180, 248, 0.14) 36%,
          transparent 70%);
      }
    }

    .particles {
      position: absolute;
      width: 430px;
      height: 430px;
      border-radius: 50%;
      overflow: hidden;
      z-index: 3;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      animation: particleDrift linear infinite;
    }

    @keyframes particleDrift {
      0% {
        transform: translateY(0) translateX(0) scale(1);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      85% {
        opacity: 0.7;
      }
      100% {
        transform: translateY(-180px) translateX(var(--dx)) scale(0.35);
        opacity: 0;
      }
    }

    .orb-scan {
      position: absolute;
      width: 430px;
      height: 430px;
      border-radius: 50%;
      overflow: hidden;
      z-index: 4;
      pointer-events: none;
    }

    .orb-scan::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(184, 208, 251, 0.45),
        rgba(138, 180, 248, 0.45),
        rgba(123, 207, 159, 0.35),
        transparent
      );
      box-shadow: 0 0 12px rgba(138, 180, 248, 0.25);
      animation: scanLine 3.2s ease-in-out infinite;
    }

    @keyframes scanLine {
      0% {
        top: 12%;
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 0.5;
      }
      100% {
        top: 88%;
        opacity: 0;
      }
    }

    .orb-text {
      position: relative;
      z-index: 5;
      text-align: center;
      width: 360px;
      padding: 0 24px;
    }

    .orb-eyebrow {
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--secondary-light);
      margin-bottom: 16px;
      font-weight: 500;
      opacity: 0.95;
    }

    .orb-headline {
      font-size: 48px;
      line-height: 1.05;
      letter-spacing: -0.04em;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text);
    }

    .orb-headline .line {
      display: block;
    }

    .orb-headline .accent {
      display: block;
      background: linear-gradient(
        90deg,
        var(--primary-light),
        var(--primary),
        var(--secondary),
        var(--primary-light)
      );
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradFlow 4s linear infinite;
    }

    @keyframes gradFlow {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    .orb-sub {
      font-size: 15px;
      line-height: 1.65;
      color: var(--text-secondary);
      max-width: 290px;
      margin: 0 auto;
      font-weight: 400;
    }

    @media (max-width: 900px) {
      .orb-scene {
        width: 560px;
        height: 560px;
      }

      .orb-ambient {
        width: 460px;
        height: 460px;
      }

      .orb-ring {
        width: 380px;
        height: 380px;
      }

      .orb-ring-2 {
        width: 430px;
        height: 430px;
      }

      .orb-body,
      .particles,
      .orb-scan {
        width: 320px;
        height: 320px;
      }

      .orb-glow {
        width: 260px;
        height: 260px;
      }

      .orb-text {
        width: 290px;
      }

      .orb-headline {
        font-size: 36px;
      }
    }
  </style>
</head>
<body>
  <div class="hero-bg">
    <div class="checker"></div>

    <div class="orb-scene">
      <div class="orb-ambient"></div>
      <div class="orb-ring"></div>
      <div class="orb-ring-2"></div>
      <div class="orb-body"></div>
      <div class="orb-glow"></div>
      <div class="particles" id="particles"></div>
      <div class="orb-scan"></div>

      <div class="orb-text">
        <div class="orb-eyebrow">Custom Web Apps</div>
        <div class="orb-headline">
          <span class="line">Built for</span>
          <span class="accent">Performance</span>
        </div>
        <p class="orb-sub">
          Clean systems, scalable architecture, and product-focused development.
        </p>
      </div>
    </div>
  </div>

  <script>
    const container = document.getElementById("particles");

    const colors = [
      "rgba(138,180,248,0.82)",
      "rgba(184,208,251,0.78)",
      "rgba(123,207,159,0.74)",
      "rgba(170,184,203,0.60)"
    ];

    for (let i = 0; i < 30; i++) {
      const p = document.createElement("div");
      p.className = "particle";

      const size = Math.random() * 3 + 4.2;
      const x = Math.random() * 390 + 10;
      const y = Math.random() * 260 + 150;
      const dx = (Math.random() - 0.5) * 70;
      const dur = Math.random() * 4 + 3.5;
      const delay = Math.random() * 6;
      const color = colors[Math.floor(Math.random() * colors.length)];

      p.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        left: ${x}px;
        top: ${y}px;
        background: ${color};
        --dx: ${dx}px;
        animation-duration: ${dur}s;
        animation-delay: -${delay}s;
        box-shadow: 0 0 ${size * 3.5}px ${color};
      `;

      container.appendChild(p);
    }
  </script>
</body>
</html>
